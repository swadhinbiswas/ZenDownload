<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Premium Dark Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#1e1b4b" /> <!-- indigo-950 -->
    </linearGradient>
    
    <!-- Neon Teal Gradient for Zen Circle (Enso) -->
    <linearGradient id="enso" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <!-- Vibrant Purple Gradient for Z-Arrow -->
    <linearGradient id="zArrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)" filter="url(#glow)"/>

  <!-- Zen Enso Circle (Incomplete ring representing Zen) -->
  <path d="M 256 100 A 156 156 0 1 1 115 190" fill="none" stroke="url(#enso)" stroke-width="32" stroke-linecap="round" />

  <!-- Z to Download Arrow -->
  <!-- Top bar of Z -->
  <path d="M 190 180 L 320 180" fill="none" stroke="url(#zArrow)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Diagonal of Z connecting to Arrow stem -->
  <path d="M 320 180 L 256 320" fill="none" stroke="url(#zArrow)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Arrow Head -->
  <path d="M 190 280 L 256 350 L 322 280" fill="none" stroke="url(#zArrow)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />

</svg>
