name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: appimage
            ext: AppImage
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: deb
            ext: deb
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
            ext: app
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos
            ext: app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: msi
            ext: msi

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: 'src-tauri' }

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-msvc

      - name: Frontend install
        run: bun install

      - name: Build app
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            bun run tauri build --bundles app
          else
            bun run tauri build --bundles ${{ matrix.artifact }}
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenDownload-${{ matrix.target }}-${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/${{ matrix.artifact }}/**/*.${{ matrix.ext }}
          if-no-files-found: warn

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD \
            --pretty=format:'* %s (%h)' > CHANGELOG.md
          echo "" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
