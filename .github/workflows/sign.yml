name: Code Signing & Notarization

# Builds signed Windows and macOS binaries.
# Requires the following secrets for full signing:
#   WINDOWS_CERT_FILE - Base64-encoded .pfx code-signing certificate
#   WINDOWS_CERT_PASSWORD - Certificate password
#   APPLE_CERTIFICATE - Base64-encoded .p12 Developer ID Application certificate
#   APPLE_CERTIFICATE_PASSWORD - p12 password
#   APPLE_SIGNING_IDENTITY - Apple Developer ID (e.g. "Developer ID Application: Your Name (TEAMID)")
#   APPLE_ID - Apple ID for notarization
#   APPLE_PASSWORD - App-specific password for notarization
#   APPLE_TEAM_ID - Apple Team ID

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '0.1.0'

env:
  APP_NAME: ZenDownload

jobs:
  # ============= Windows Code Signing =============
  windows-signed:
    name: Windows Signed (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        shell: bash
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break
            echo "::warning::bun install attempt $i failed, clearing cache and retrying"
            bun pm cache rm 2>/dev/null || true
            sleep 3
          done

      - name: Build Tauri (no signing yet)
        run: bun run tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: Sign Windows binaries
        if: env.WINDOWS_CERT_FILE != ''
        env:
          WINDOWS_CERT_FILE: ${{ secrets.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          # Decode cert
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERT_FILE)
          $path = "$env:TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          $pwd = ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -Force -AsPlainText

          # Import to user store
          Import-PfxCertificate -FilePath $path -Password $pwd -CertStoreLocation Cert:\CurrentUser\My
          $thumb = Get-ChildItem -Path Cert:\CurrentUser\My | Where-Object { $_.HasPrivateKey } | Select-Object -First 1 | ForEach-Object { $_.Thumbprint }

          # Sign all PE binaries (exe, dll)
          $bundleDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          Write-Host "=== Signing EXE files ==="
          Get-ChildItem -Path $bundleDir -Recurse -Include *.exe | ForEach-Object {
            Write-Host "Signing $($_.FullName)"
            & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
              /sha1 $thumb `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /fd sha256 `
              $_.FullName
          }

          Write-Host "=== Signing DLL files ==="
          Get-ChildItem -Path $bundleDir -Recurse -Include *.dll | ForEach-Object {
            & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
              /sha1 $thumb `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /fd sha256 `
              $_.FullName
          }

          # Sign installers (MSI is signed by WiX, NSIS via tauri)
          Write-Host "=== Done ==="

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zendownload-windows-signed
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ============= macOS Notarization =============
  macos-signed:
    name: macOS Notarized (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            runner: macos-latest
          - target: x86_64-apple-darwin
            arch: x64
            runner: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Rust target
        working-directory: src-tauri
        run: rustup target add ${{ matrix.target }}

      - name: Install JS deps
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break
            echo "::warning::bun install attempt $i failed, clearing cache and retrying"
            bun pm cache rm 2>/dev/null || true
            sleep 3
          done

      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH

      - name: Build Tauri (macOS)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            export CSC_LINK=$RUNNER_TEMP/cert.p12
            export CSC_KEY_PASSWORD="$APPLE_CERTIFICATE_PASSWORD"
          fi
          bun run tauri build --target ${{ matrix.target }} --bundles app

      - name: Notarize .app
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          ls -la "$APP_PATH"
          for app in "$APP_PATH"/*.app; do
            echo "Notarizing $app"
            ditto -c -k --sequesterRsrc --keepParent "$app" "${app}.zip"
            xcrun notarytool submit "${app}.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$app"
            rm -f "${app}.zip"
          done

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zendownload-macos-signed-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
