name: Nightly Build

# Builds a "nightly" or "edge" build from main branch
# Used for testing and pre-release feedback

on:
  push:
    branches: [main]
  schedule:
    # Run every night at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  APP_NAME: ZenDownload
  CARGO_TERM_COLOR: always

jobs:
  linux-nightly:
    name: Linux Nightly
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libnotify-dev patchelf file

      - name: Install JS deps
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break
            echo "::warning::bun install attempt $i failed, clearing cache and retrying"
            bun pm cache rm 2>/dev/null || true
            sleep 3
          done

      - name: Build
        run: bun run tauri build --bundles deb,appimage

      - name: Generate version
        id: v
        run: |
          VERSION="0.0.0-nightly-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          cd src-tauri/target/release/bundle/deb
          for f in *.deb; do mv "$f" "${APP_NAME}-nightly-$(date +%Y%m%d)-amd64.deb" 2>/dev/null || true; done
          cd ../appimage
          for f in *.AppImage; do mv "$f" "${APP_NAME}-nightly-$(date +%Y%m%d)-x86_64.AppImage" 2>/dev/null || true; done

      - name: Upload nightly
        uses: actions/upload-artifact@v4
        with:
          name: zendownload-nightly-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  windows-nightly:
    name: Windows Nightly
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        shell: bash
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break
            echo "::warning::bun install attempt $i failed, clearing cache and retrying"
            bun pm cache rm 2>/dev/null || true
            sleep 3
          done

      - name: Build
        run: bun run tauri build --bundles msi,nsis

      - name: Rename
        shell: bash
        run: |
          cd src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi
          for f in *.msi; do mv "$f" "${APP_NAME}-nightly-$(date +%Y%m%d)-x64.msi" 2>/dev/null || true; done
          cd ../nsis
          for f in *.exe; do mv "$f" "${APP_NAME}-nightly-$(date +%Y%m%d)-x64-setup.exe" 2>/dev/null || true; done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zendownload-nightly-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  macos-nightly:
    name: macOS Nightly (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Rust target
        working-directory: src-tauri
        run: rustup target add ${{ matrix.target }}

      - name: Install JS deps
        run: |
          for i in 1 2 3; do
            bun install --frozen-lockfile && break
            echo "::warning::bun install attempt $i failed, clearing cache and retrying"
            bun pm cache rm 2>/dev/null || true
            sleep 3
          done

      - name: Build
        run:           bun run tauri build --target ${{ matrix.target }} --bundles app

      - name: Rename
        shell: bash
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          for f in *.app; do mv "$f" "${APP_NAME}-nightly-$(date +%Y%m%d)-${{ matrix.arch }}.app" 2>/dev/null || true; done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zendownload-nightly-macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
