name: Deploy Privacy Policy

# Publishes the Play Store privacy policy to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
    paths:
      - 'playstore/privacy-policy.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>ZenDownload — Privacy Policy</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css" />
            <style>
              body { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
              h1 { border-bottom: 2px solid #6366f1; padding-bottom: .4rem; }
              a { color: #6366f1; }
            </style>
          </head>
          <body>
          EOF
          cat playstore/privacy-policy.md >> _site/index.html
          cat >> _site/index.html <<'EOF'
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
