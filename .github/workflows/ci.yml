name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: TypeScript + Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: 'src-tauri' }

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Frontend install + type check
        run: |
          bun install
          # Verify critical UI deps actually landed in node_modules.
          # `bun install` can silently skip packages with platform-specific
          # optional deps; this catches that before tsc reports confusing
          # "Cannot find module" errors for 50+ files.
          for pkg in react @base-ui/react zustand tailwind-merge clsx class-variance-authority lucide-react @tauri-apps/api; do
            if [ ! -d "node_modules/$pkg" ]; then
              echo "::error::Missing dependency: $pkg - running bun install --force"
              bun install --force
              break
            fi
          done
          bun run tsc --noEmit

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --all-features

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: 'src-tauri' }

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Frontend tests
        run: |
          bun install
          if find src -name '*.test.*' -o -name '*.spec.*' 2>/dev/null | grep -q .; then
            bun run test
          else
            echo "No frontend tests found, skipping."
          fi
