name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============= TypeScript / Frontend Lint =============
  frontend:
    name: Frontend (TypeScript + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build frontend
        run: bun run build

  # ============= Rust / Backend Check =============
  rust-check:
    name: Rust Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libnotify-dev \
            patchelf

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --no-deps -- -D warnings
        continue-on-error: true

  # ============= Quick Build (Linux .deb) =============
  build-linux:
    name: Build Linux (.deb)
    needs: [frontend, rust-check]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libnotify-dev \
            patchelf \
            file

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build Tauri (.deb)
        run: bun run tauri build --bundles deb
        env:
          NO_STRIP: true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: zendownload-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
