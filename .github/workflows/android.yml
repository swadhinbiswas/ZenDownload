name: Android (Play Store)

# Builds a signed Android App Bundle (AAB) on every push to main and on version tags,
# then uploads the AAB to the Google Play internal track.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal, alpha, beta, production)'
        required: true
        default: 'internal'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y librsvg2-bin

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Decode keystore (tag builds only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p src-tauri/gen/android
            echo "$KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/zendownload-release.keystore
            echo "Keystore decoded."
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret is not set; build will be unsigned."
          fi

      - name: Write keystore.properties (tag builds only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/src-tauri/gen/android/zendownload-release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          cat src-tauri/gen/android/keystore.properties

      - name: Init Android project (generates tauri.settings.gradle)
        working-directory: src-tauri
        run: bunx @tauri-apps/cli@latest android init --ci

      - name: Build signed AAB
        working-directory: src-tauri
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: bunx @tauri-apps/cli@latest android build --aab

      - name: Locate AAB
        id: locate
        run: |
          AAB=$(find src-tauri/gen/android -name "app-release.aab" -path "*/bundle/*" | head -1)
          if [ -z "$AAB" ]; then
            echo "AAB not found."
            find src-tauri/gen/android -name "*.aab" 2>/dev/null
            exit 1
          fi
          echo "aab=$AAB" >> $GITHUB_OUTPUT
          echo "AAB at $AAB ($(du -h "$AAB" | cut -f1))"

      - name: Verify AAB signature
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          jarsigner -verify -verbose "${{ steps.locate.outputs.aab }}" || true

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenDownload-android-${{ github.sha }}
          path: ${{ steps.locate.outputs.aab }}
          if-no-files-found: error

      # ----- Convert Play Store SVG assets to PNG -----
      - name: Convert Play Store SVG assets to PNG
        run: |
          mkdir -p assets/playstore/png
          rsvg-convert -w 512  -h 512  assets/playstore/icon-512.svg         > assets/playstore/png/icon-512.png
          rsvg-convert -w 1024 -h 500  assets/playstore/feature-graphic.svg  > assets/playstore/png/feature-graphic.png
          for i in 1 2 3 4 5 6 7 8; do
            rsvg-convert -w 540 -h 960 assets/playstore/screenshot-phone-$i.svg \
              > assets/playstore/png/screenshot-phone-$i.png
          done
          for i in 1 2; do
            rsvg-convert -w 1280 -h 800 assets/playstore/screenshot-tablet-$i.svg \
              > assets/playstore/png/screenshot-tablet-$i.png
          done
          ls -la assets/playstore/png/

      - name: Upload Play Store screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZenDownload-playstore-assets-${{ github.sha }}
          path: assets/playstore/png/
          if-no-files-found: warn

      # ----- Upload to Play Store (only on tag pushes) -----
      - name: Upload to Google Play
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.zendownload.app
          releaseFiles: ${{ steps.locate.outputs.aab }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          mappingFile: src-tauri/gen/android/app/build/outputs/mapping/release/mapping.txt
          whatsNewDirectory: playstore/
          imageDirectory: assets/playstore/png/
          changelogFile: playstore/release-notes.md

  attach-to-release:
    name: Attach AAB to GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ZenDownload-android-${{ github.sha }}
      - uses: softprops/action-gh-release@v2
        with:
          files: app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
