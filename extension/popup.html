<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
    }
    h1 { font-size: 16px; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
    h1 svg { color: #6366f1; }
    .subtitle { font-size: 11px; color: #71717a; margin: 0 0 16px; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status.online { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7; }
    .status.offline { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status.online .dot { background: #10b981; box-shadow: 0 0 8px #10b981; }
    .status.offline .dot { background: #ef4444; }
    button {
      width: 100%;
      padding: 10px 12px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
    button:active { transform: translateY(0); }
    button.secondary { background: #27272a; }
    button.secondary:hover { background: #3f3f46; box-shadow: none; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
    }
    .stat-label { font-size: 10px; color: #71717a; text-transform: uppercase; }
    .stat-value { font-size: 14px; font-weight: 600; }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .setting-label { font-size: 12px; color: #d4d4d8; }
    .setting-desc { font-size: 10px color: #71717a; margin-top: 2px; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #3f3f46;
      border-radius: 20px;
      transition: 0.2s;
    }
    .toggle .slider:before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="7 10 12 15 17 10"></polyline>
      <line x1="12" y1="15" x2="12" y2="3"></line>
    </svg>
    ZenDownload
  </h1>
  <p class="subtitle">Browser capture</p>

  <div id="status" class="status offline">
    <span class="dot"></span>
    <span id="status-text">Checking...</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Detected</div>
      <div class="stat-value" id="files-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Sent</div>
      <div class="stat-value" id="sent-count">0</div>
    </div>
  </div>

  <div class="setting-row">
    <div>
      <div class="setting-label">Intercept downloads</div>
      <div class="setting-desc">Auto-capture Chrome downloads</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="intercept-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <button id="capture-page">Capture All Links on Page</button>
  <button id="open-panel" class="secondary">Show Link Panel</button>
  <button id="open-app" class="secondary">Open ZenDownload App</button>

  <script src="popup.js"></script>
</body>
</html>
