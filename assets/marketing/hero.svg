</g>

<text x="640" y="120" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#a5b4fc" letter-spacing="6">UNIVERSAL DOWNLOAD MANAGER</text>
<text x="640" y="220" text-anchor="middle" font-family="Arial" font-size="84" font-weight="800" fill="#fafafa">One App.</text>
<text x="640" y="310" text-anchor="middle" font-family="Arial" font-size="84" font-weight="800" fill="url(#brand)">Every Download.</text>
<text x="640" y="370" text-anchor="middle" font-family="Arial" font-size="18" fill="#a1a1aa">HTTP, torrents, videos from 1,462+ sites, music, debrid - in one beautiful native app.</text>

