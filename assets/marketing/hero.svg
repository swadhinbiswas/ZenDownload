<text x="100" y="74" font-size="12" fill="#a1a1aa">YouTube, Twitter, Reddit, TikTok</text>
<text x="20" y="124" font-size="12" fill="#a1a1aa">Quality picker, format selection,</text>
<text x="20" y="142" font-size="12" fill="#a1a1aa">browser extension with universal</text>
<text x="20" y="160" font-size="12" fill="#a1a1aa">video capture.</text>
