<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0814"/><stop offset="1" stop-color="#14102a"/></linearGradient>
<linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6366f1"/><stop offset=".5" stop-color="#8b5cf6"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
<linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a1530" stop-opacity=".8"/><stop offset="1" stop-color="#0f0b22" stop-opacity=".8"/></linearGradient>
<linearGradient id="prog" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
</defs>
<rect width="1280" height="800" fill="url(#bg)"/>
<rect width="1280" height="40" fill="#0d0820"/>
<circle cx="20" cy="20" r="6" fill="#ef4444"/><circle cx="40" cy="20" r="6" fill="#eab308"/><circle cx="60" cy="20" r="6" fill="#22c55e"/>
<text x="640" y="26" font-family="Arial" font-size="13" fill="#71717a" text-anchor="middle">ZenDownload - Speed Test</text>

<rect x="0" y="40" width="240" height="760" fill="#0d0820"/>
<rect x="239" y="40" width="1" height="760" fill="#1f1838"/>
<g transform="translate(20,60)"><rect width="32" height="32" rx="8" fill="url(#brand)"/><text x="44" y="22" font-family="Arial" font-size="15" font-weight="700" fill="#e4e4e7">ZenDownload</text></g>

<g font-family="Arial" font-size="13" fill="#a1a1aa">
<text x="60" y="143">Downloads</text>
<text x="60" y="183">Torrents</text>
<text x="60" y="223">Videos</text>
<text x="60" y="263">Music</text>
<text x="60" y="303">Subscriptions</text>
<rect x="12" y="325" width="216" height="36" rx="8" fill="url(#brand)" opacity=".15"/>
<rect x="12" y="325" width="3" height="36" rx="2" fill="url(#brand)"/>
<text x="60" y="348" fill="#e4e4e7" font-weight="600">Speed Test</text>
</g>

<g transform="translate(264,64)">
<text font-family="Arial" font-size="26" font-weight="800" fill="#fafafa">Speed Test</text>
<text y="24" font-family="Arial" font-size="13" fill="#a1a1aa">Multi-server benchmark - live graph</text>

<g transform="translate(0,60)">
<rect width="980" height="320" rx="14" fill="url(#card)" stroke="#1f1838"/>
<circle cx="490" cy="160" r="120" fill="none" stroke="#1f1838" stroke-width="20"/>
<circle cx="490" cy="160" r="120" fill="none" stroke="url(#prog)" stroke-width="20" stroke-dasharray="565 754" stroke-linecap="round" transform="rotate(-90 490 160)"/>
<text x="490" y="156" text-anchor="middle" font-family="Arial" font-size="48" font-weight="800" fill="#fafafa">187</text>
<text x="490" y="184" text-anchor="middle" font-family="Arial" font-size="14" fill="#a1a1aa">Mbps</text>
<text x="490" y="208" text-anchor="middle" font-family="Arial" font-size="11" fill="#22c55e" font-weight="600">Excellent connection</text>
</g>

<g transform="translate(0,400)">
<rect width="980" height="280" rx="14" fill="url(#card)" stroke="#1f1838"/>
<text x="20" y="34" font-family="Arial" font-size="16" font-weight="700" fill="#fafafa">Live Throughput</text>
<text x="960" y="34" text-anchor="end" font-family="Arial" font-size="11" fill="#71717a">Last 30 seconds</text>

<g transform="translate(40,60)">
<line x1="0" y1="180" x2="900" y2="180" stroke="#1f1838"/>
<line x1="0" y1="40" x2="900" y2="40" stroke="#1f1838" stroke-dasharray="2 4"/>
<line x1="0" y1="90" x2="900" y2="90" stroke="#1f1838" stroke-dasharray="2 4"/>
<line x1="0" y1="135" x2="900" y2="135" stroke="#1f1838" stroke-dasharray="2 4"/>
<text x="-8" y="184" text-anchor="end" font-family="Arial" font-size="10" fill="#71717a">0</text>
<text x="-8" y="139" text-anchor="end" font-family="Arial" font-size="10" fill="#71717a">100</text>
<text x="-8" y="94" text-anchor="end" font-family="Arial" font-size="10" fill="#71717a">150</text>
<text x="-8" y="44" text-anchor="end" font-family="Arial" font-size="10" fill="#71717a">200 Mbps</text>

<polyline points="0,100 50,80 100,70 150,60 200,50 250,55 300,40 350,45 400,35 450,30 500,40 550,28 600,32 650,25 700,30 750,22 800,28 850,24 900,26" stroke="url(#prog)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<polygon points="0,100 50,80 100,70 150,60 200,50 250,55 300,40 350,45 400,35 450,30 500,40 550,28 600,32 650,25 700,30 750,22 800,28 850,24 900,26 900,180 0,180" fill="url(#prog)" opacity=".12"/>

<line x1="0" y1="190" x2="900" y2="190" stroke="#1f1838"/>
<text x="0" y="208" font-family="Arial" font-size="10" fill="#71717a">0s</text>
<text x="220" y="208" font-family="Arial" font-size="10" fill="#71717a">10s</text>
<text x="445" y="208" font-family="Arial" font-size="10" fill="#71717a">20s</text>
<text x="665" y="208" font-family="Arial" font-size="10" fill="#71717a">30s</text>
</g>
</g>
</g>
</svg>
