    <g transform="translate(80, 80)" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M0 -50 V 14"/>
      <path d="M-22 -10 L 0 14 L 22 -10"/>
      <path d="M-40 30 V 42 a 8 8 0 0 0 8 8 H 32 a 8 8 0 0 0 8 -8 V 30"/>
    </g>
