  <rect width="1280" height="320" fill="url(#glowLeft)"/>
  <rect width="1280" height="320" fill="url(#glowRight)"/>

  <g opacity="0.10" stroke="#a78bfa" stroke-width="1" fill="none">
    <path d="M0 100 Q 320 80 640 100 T 1280 100"/>
    <path d="M0 220 Q 320 200 640 220 T 1280 220"/>
  </g>

  <g opacity="0.04" fill="#a78bfa">
    <circle cx="80" cy="60" r="1.2"/>
    <circle cx="220" cy="40" r="1"/>
    <circle cx="380" cy="80" r="1.4"/>
    <circle cx="540" cy="50" r="1"/>
    <circle cx="700" cy="70" r="1.2"/>
    <circle cx="860" cy="40" r="1"/>
    <circle cx="1020" cy="80" r="1.4"/>
    <circle cx="1180" cy="50" r="1"/>
    <circle cx="120" cy="260" r="1.2"/>
    <circle cx="320" cy="280" r="1"/>
    <circle cx="520" cy="260" r="1.4"/>
    <circle cx="720" cy="280" r="1"/>
