<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="50%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="zGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <g opacity="0.15">
    <circle cx="90" cy="90" r="70" fill="#a5b4fc"/>
    <circle cx="422" cy="422" r="90" fill="#818cf8"/>
    <circle cx="430" cy="100" r="40" fill="#c7d2fe"/>
    <circle cx="70" cy="430" r="55" fill="#a5b4fc"/>
  </g>

  <g opacity="0.08">
    <path d="M 60 60 L 452 60 M 60 100 L 452 100 M 60 412 L 452 412 M 60 452 L 452 452" stroke="#c7d2fe" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M 176 140
             L 336 140
             L 176 320
             L 336 320"
          stroke="url(#zGrad)"
          stroke-width="44"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M 256 350 L 256 400" stroke="url(#arrow)" stroke-width="22" stroke-linecap="round"/>
    <path d="M 230 380 L 256 410 L 282 380"
          stroke="url(#arrow)" stroke-width="22"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M 186 432
             Q 186 452 206 452
             L 306 452
             Q 326 452 326 432"
          stroke="url(#tray)" stroke-width="22" stroke-linecap="round" fill="none"/>
  </g>

  <circle cx="256" cy="135" r="6" fill="#e0e7ff" opacity="0.9"/>
</svg>
